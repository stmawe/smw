<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ theme.name }} - Preview</title>
    <style>
        {{ theme_css|safe }}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--theme-typography-font-family-primary); background: var(--theme-colors-background, white); color: var(--theme-colors-text, #333); }
        .preview-container { max-width: 1200px; margin: 0 auto; padding: var(--theme-spacing-gap-xlarge, 24px); }
        .navbar { background: linear-gradient(135deg, var(--theme-colors-primary, #667eea) 0%, var(--theme-colors-primary-dark, #764ba2) 100%); color: white; padding: var(--theme-spacing-gap-large, 16px) var(--theme-spacing-gap-xlarge, 24px); margin-bottom: var(--theme-spacing-gap-xlarge, 24px); border-radius: var(--theme-borders-radius-medium, 8px); }
        .navbar h1 { margin: 0; font-size: 24px; }
        .components { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--theme-spacing-gap-xlarge, 24px); }
        .component { background: var(--theme-colors-surface, #f5f5f5); padding: var(--theme-spacing-gap-xlarge, 24px); border-radius: var(--theme-borders-radius-medium, 8px); border: 1px solid var(--theme-colors-border, #ddd); }
        .component h2 { font-size: 18px; margin-bottom: var(--theme-spacing-gap-large, 16px); }
        .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: var(--theme-spacing-gap-medium, 8px); }
        .color-box { height: 80px; border-radius: var(--theme-borders-radius-small, 4px); display: flex; align-items: flex-end; justify-content: center; padding: var(--theme-spacing-gap-small, 4px); font-size: 11px; color: white; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); }
        .btn { padding: var(--theme-spacing-gap-medium, 8px) var(--theme-spacing-gap-large, 16px); background: var(--theme-colors-primary, #667eea); color: white; border: none; border-radius: var(--theme-borders-radius-small, 4px); cursor: pointer; margin-right: var(--theme-spacing-gap-medium, 8px); margin-bottom: var(--theme-spacing-gap-medium, 8px); }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: var(--theme-colors-secondary, #f093fb); }
        .btn-success { background: var(--theme-colors-success, #3c3); }
        .btn-warning { background: var(--theme-colors-warning, #ff9800); }
        .btn-error { background: var(--theme-colors-error, #c33); }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="navbar">
            <h1>{{ theme.name }} Theme Preview</h1>
        </div>
        
        <div class="components">
            <!-- Colors -->
            <div class="component">
                <h2>Colors</h2>
                <div class="color-grid">
                    <div class="color-box" style="background: var(--theme-colors-primary, #667eea);">Primary</div>
                    <div class="color-box" style="background: var(--theme-colors-secondary, #f093fb); color: #333;">Secondary</div>
                    <div class="color-box" style="background: var(--theme-colors-success, #3c3);">Success</div>
                    <div class="color-box" style="background: var(--theme-colors-warning, #ff9800);">Warning</div>
                    <div class="color-box" style="background: var(--theme-colors-error, #c33);">Error</div>
                    <div class="color-box" style="background: var(--theme-colors-info, #2196f3);">Info</div>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="component">
                <h2>Buttons</h2>
                <div>
                    <button class="btn">Primary</button>
                    <button class="btn btn-secondary">Secondary</button>
                    <button class="btn btn-success">Success</button>
                    <button class="btn btn-warning">Warning</button>
                    <button class="btn btn-error">Error</button>
                </div>
            </div>
            
            <!-- Typography -->
            <div class="component">
                <h2>Typography</h2>
                <p style="font-size: var(--theme-typography-font-size-large, 18px); margin-bottom: var(--theme-spacing-gap-medium, 8px);">Large Text</p>
                <p style="font-size: var(--theme-typography-font-size-base, 16px); margin-bottom: var(--theme-spacing-gap-medium, 8px);">Base Text</p>
                <p style="font-size: var(--theme-typography-font-size-small, 14px); color: var(--theme-colors-text-secondary, #666);">Small Text</p>
            </div>
            
            <!-- Spacing & Borders -->
            <div class="component">
                <h2>Elements</h2>
                <div style="border: 1px solid var(--theme-colors-border, #ddd); border-radius: var(--theme-borders-radius-medium, 8px); padding: var(--theme-spacing-gap-large, 16px); background: var(--theme-colors-background, white);">
                    <p>Card with border-radius and padding</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
