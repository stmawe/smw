<!-- ============================================================
     NAVBAR COMPONENT
     Sticky glassmorphism navbar with mobile hamburger menu
     ============================================================ -->

{% load static %}

<header class="navbar-container">
  <nav class="navbar">
    <div class="container-lg navbar-content">
      <!-- Logo -->
      <div class="navbar-logo">
        <a href="{% url 'index' %}" class="logo-link">
          <span class="logo-icon">◈</span>
          <span class="logo-text">UniMarket</span>
        </a>
      </div>

      <!-- Hamburger Menu Toggle (Mobile) -->
      <button class="navbar-toggle hidden-desktop" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Navigation Menu -->
      <ul class="navbar-menu hidden-mobile">
        <li><a href="{% url 'index' %}" class="nav-link">Home</a></li>
        <li><a href="{% url 'explore' %}" class="nav-link">Explore Shops</a></li>
        <li><a href="{% url 'listings' %}" class="nav-link">Products</a></li>
        <li><a href="{% url 'universities' %}" class="nav-link">Universities</a></li>
        <li><a href="{% url 'locations' %}" class="nav-link">Locations</a></li>
      </ul>

      <!-- Auth Buttons -->
      <div class="navbar-actions">
        <a href="{% url 'create_shop' %}" class="btn btn-accent btn-pill btn-sm">
          Sell
        </a>
        <a href="{% url 'login' %}" class="btn btn-ghost btn-pill btn-sm">
          Sign In
        </a>
      </div>
    </div>

    <!-- Mobile Menu Drawer -->
    <div class="navbar-drawer hidden-desktop">
      <ul class="drawer-menu">
        <li><a href="{% url 'index' %}" class="drawer-link">Home</a></li>
        <li><a href="{% url 'explore' %}" class="drawer-link">Explore Shops</a></li>
        <li><a href="{% url 'listings' %}" class="drawer-link">Products</a></li>
        <li><a href="{% url 'universities' %}" class="drawer-link">Universities</a></li>
        <li><a href="{% url 'locations' %}" class="drawer-link">Locations</a></li>
        <li><a href="{% url 'create_shop' %}" class="drawer-link drawer-link-primary">Sell</a></li>
        <li><a href="{% url 'login' %}" class="drawer-link drawer-link-secondary">Sign In</a></li>
      </ul>
    </div>
  </nav>
</header>

<!-- Scroll Indicator with Hamburger -->
<div class="navbar-scroll-indicator" id="scrollIndicator">
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle navbar" aria-expanded="false">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>
</div>

<!-- Expanded Navbar Overlay (appears on hamburger click) -->
<div class="navbar-expanded" id="expandedNavbar">
  <button class="hamburger-close" id="hamburgerClose" aria-label="Close navbar">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>
  <div class="expanded-content">
    <ul class="expanded-menu">
      <li><a href="{% url 'index' %}" class="expanded-link">Home</a></li>
      <li><a href="{% url 'explore' %}" class="expanded-link">Explore Shops</a></li>
      <li><a href="{% url 'listings' %}" class="expanded-link">Products</a></li>
      <li><a href="{% url 'universities' %}" class="expanded-link">Universities</a></li>
      <li><a href="{% url 'locations' %}" class="expanded-link">Locations</a></li>
      <li class="expanded-divider"></li>
      <li><a href="{% url 'create_shop' %}" class="expanded-link expanded-link-primary">Sell</a></li>
      <li><a href="{% url 'login' %}" class="expanded-link expanded-link-secondary">Sign In</a></li>
    </ul>
  </div>
</div>

<style>
/* ============================================================
   KEYFRAME ANIMATIONS (must be at top)
   ============================================================ */

@keyframes slideInContent {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ============================================================
   NAVBAR STYLES
   ============================================================ */

.navbar-container {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--border-dim);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  transform: translateY(0);
}

.navbar-container.scrolled-down {
  transform: translateY(-100%);
  box-shadow: none;
}

.navbar-scroll-indicator {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1001;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.navbar-scroll-indicator.visible {
  opacity: 1;
  visibility: visible;
}

/* Hamburger Button */
.hamburger-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--color-primary);
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: var(--shadow-lg);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 0;
}

.hamburger-btn:hover {
  background: var(--color-primary-hover);
  transform: scale(1.08);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
}

.hamburger-btn.active {
  transform: rotate(90deg);
}

.hamburger-line {
  width: 24px;
  height: 2.5px;
  background: white;
  border-radius: 2px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.hamburger-btn.active .hamburger-line:nth-child(1) {
  transform: translateY(11px) rotate(45deg);
}

.hamburger-btn.active .hamburger-line:nth-child(2) {
  opacity: 0;
}

.hamburger-btn.active .hamburger-line:nth-child(3) {
  transform: translateY(-11px) rotate(-45deg);
}

/* Expanded Navbar Overlay */
.navbar-expanded {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  z-index: 999;
  opacity: 0;
  visibility: hidden;
  transform: translateX(-100%);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-6);
}

.navbar-expanded.active {
  opacity: 1;
  visibility: visible;
  transform: translateX(0);
}

.hamburger-close {
  position: absolute;
  top: 24px;
  left: 24px;
  width: 48px;
  height: 48px;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.3s ease;
  padding: 0;
}

.hamburger-close:hover {
  transform: scale(1.1);
}

.hamburger-close .hamburger-line {
  width: 24px;
  height: 2.5px;
  background: var(--text-1);
  border-radius: 2px;
  position: absolute;
  transition: all 0.3s ease;
}

.hamburger-close .hamburger-line:nth-child(1) {
  transform: rotate(45deg);
}

.hamburger-close .hamburger-line:nth-child(2) {
  transform: rotate(-45deg);
}

/* Expanded Menu */
.expanded-content {
  text-align: center;
  animation: slideInContent 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.expanded-menu {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: var(--space-5);
}

.expanded-link {
  font: 600 28px/1.2 var(--font-display);
  color: var(--text-1);
  text-decoration: none;
  transition: color 0.2s ease;
  display: block;
  padding: var(--space-3);
}

.expanded-link:hover {
  color: var(--color-primary);
}

.expanded-link-primary {
  background: var(--color-primary);
  color: white;
  border-radius: 12px;
  font-size: 20px;
}

.expanded-link-primary:hover {
  background: var(--color-primary-hover);
  color: white;
}

.expanded-link-secondary {
  background: var(--surface-2);
  color: var(--text-1);
  border-radius: 12px;
  font-size: 20px;
}

.expanded-link-secondary:hover {
  background: var(--surface-3);
}

.expanded-divider {
  height: 1px;
  background: var(--border-dim);
  margin: var(--space-3) 0;
}

.navbar {
  padding: var(--space-4) 0;
}

.navbar-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-5);
}

/* Logo */
.navbar-logo {
  flex-shrink: 0;
}

.logo-link {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  text-decoration: none;
  font: 700 24px/1 var(--font-display);
  color: var(--text-1);
  transition: color 0.2s ease;
}

.logo-link:hover {
  color: var(--color-accent);
}

.logo-icon {
  color: var(--color-accent);
  font-size: 28px;
}

.logo-text {
  letter-spacing: -0.02em;
}

/* Navigation Menu */
.navbar-menu {
  display: flex;
  align-items: center;
  gap: var(--space-6);
  flex: 1;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-link {
  font: 500 15px/1.4 var(--font-body);
  color: var(--text-2);
  text-decoration: none;
  position: relative;
  transition: color 0.2s ease;
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--color-accent);
  transition: width 0.3s ease;
}

.nav-link:hover {
  color: var(--text-1);
}

.nav-link:hover::after {
  width: 100%;
}

/* Auth Buttons */
.navbar-actions {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
}

/* Hamburger Toggle (Mobile) */
.navbar-toggle {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--space-2);
  z-index: 1001;
}

.navbar-toggle span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--text-1);
  border-radius: 1px;
  transition: all 0.3s ease;
}

.navbar-toggle.active span:nth-child(1) {
  transform: rotate(45deg) translateY(10px);
}

.navbar-toggle.active span:nth-child(2) {
  opacity: 0;
}

.navbar-toggle.active span:nth-child(3) {
  transform: rotate(-45deg) translateY(-10px);
}

/* Mobile Drawer */
.navbar-drawer {
  position: fixed;
  right: -100%;
  top: 64px;
  width: 100%;
  max-width: 400px;
  height: calc(100vh - 64px);
  background: var(--surface-0);
  border-left: 1px solid var(--border-dim);
  transition: right 0.3s ease;
  overflow-y: auto;
  z-index: 999;
}

.navbar-drawer.active {
  right: 0;
}

.drawer-menu {
  list-style: none;
  margin: 0;
  padding: var(--space-4);
}

.drawer-link {
  display: block;
  padding: var(--space-4) 0;
  font: 500 15px/1.4 var(--font-body);
  color: var(--text-2);
  text-decoration: none;
  border-bottom: 1px solid var(--border-dim);
  transition: color 0.2s ease;
}

.drawer-link:hover {
  color: var(--color-accent);
}

.drawer-link-primary {
  color: var(--color-accent);
  font-weight: 600;
}

.drawer-link-secondary {
  color: var(--color-primary);
}

/* Responsive */
@media (max-width: 768px) {
  .navbar-content {
    padding: 0 var(--space-3);
  }

  .navbar-menu {
    display: none;
  }

  .navbar-actions {
    display: none;
  }

  .hidden-mobile {
    display: none !important;
  }

  .hidden-desktop {
    display: flex !important;
  }
}

@media (min-width: 769px) {
  .navbar-toggle {
    display: none;
  }

  .navbar-drawer {
    display: none;
  }
}
</style>

<script>
// Navbar scroll animation and hamburger toggle functionality
document.addEventListener('DOMContentLoaded', function() {
  const toggle = document.querySelector('.navbar-toggle');
  const drawer = document.querySelector('.navbar-drawer');
  const drawerLinks = document.querySelectorAll('.drawer-link');
  const navbar = document.querySelector('.navbar-container');
  const scrollIndicator = document.getElementById('scrollIndicator');
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const expandedNavbar = document.getElementById('expandedNavbar');
  const hamburgerClose = document.getElementById('hamburgerClose');
  const expandedLinks = document.querySelectorAll('.expanded-link:not(.expanded-divider)');
  
  let lastScrollPosition = 0;
  let isNavbarVisible = true;
  let isExpandedNavbarOpen = false;

  // Scroll event listener for navbar animation
  window.addEventListener('scroll', function() {
    const currentScroll = window.pageYOffset || document.documentElement.scrollTop;
    
    if (currentScroll > 100) { // Only hide after scrolling 100px
      if (currentScroll > lastScrollPosition && isNavbarVisible && !isExpandedNavbarOpen) {
        // Scrolling down - hide navbar
        navbar.classList.add('scrolled-down');
        scrollIndicator.classList.add('visible');
        isNavbarVisible = false;
      } else if (currentScroll < lastScrollPosition && !isNavbarVisible && !isExpandedNavbarOpen) {
        // Scrolling up - show navbar
        navbar.classList.remove('scrolled-down');
        scrollIndicator.classList.remove('visible');
        isNavbarVisible = true;
      }
    } else {
      // Near top - always show navbar
      navbar.classList.remove('scrolled-down');
      scrollIndicator.classList.remove('visible');
      isNavbarVisible = true;
    }
    
    lastScrollPosition = currentScroll <= 0 ? 0 : currentScroll;
  });

  // Hamburger button functionality - expand navbar
  if (hamburgerBtn) {
    hamburgerBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      hamburgerBtn.classList.toggle('active');
      expandedNavbar.classList.toggle('active');
      isExpandedNavbarOpen = expandedNavbar.classList.contains('active');
    });
  }

  // Close expanded navbar button
  if (hamburgerClose) {
    hamburgerClose.addEventListener('click', function(e) {
      e.stopPropagation();
      hamburgerBtn.classList.remove('active');
      expandedNavbar.classList.remove('active');
      isExpandedNavbarOpen = false;
    });
  }

  // Close expanded navbar when clicking on a link
  expandedLinks.forEach(link => {
    link.addEventListener('click', function() {
      hamburgerBtn.classList.remove('active');
      expandedNavbar.classList.remove('active');
      isExpandedNavbarOpen = false;
    });
  });

  // Close expanded navbar when clicking outside
  if (expandedNavbar) {
    expandedNavbar.addEventListener('click', function(e) {
      if (e.target === expandedNavbar) {
        hamburgerBtn.classList.remove('active');
        expandedNavbar.classList.remove('active');
        isExpandedNavbarOpen = false;
      }
    });
  }

  if (toggle) {
    toggle.addEventListener('click', function() {
      toggle.classList.toggle('active');
      drawer.classList.toggle('active');
    });

    // Close drawer when clicking on a link
    drawerLinks.forEach(link => {
      link.addEventListener('click', function() {
        toggle.classList.remove('active');
        drawer.classList.remove('active');
      });
    });

    // Close drawer when clicking outside
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.navbar')) {
        toggle.classList.remove('active');
        drawer.classList.remove('active');
      }
    });
  }
});
</script>
