<!-- ============================================================
     HERO SECTION COMPONENT
     Particle field background with search bar and CTA
     ============================================================ -->

<div class="hero-wrapper">
  <!-- Particle field background -->
  <div class="particles-container">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Hero content -->
  <div class="hero-content">
    <h1 class="hero-title">Discover Unique Shops & Items</h1>
    <p class="hero-subtitle">Browse curated collections from creative sellers across {{ site_name }}</p>

    <!-- Search bar -->
    <div class="hero-search">
      <form method="GET" action="{% url 'search' %}" class="search-form">
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input 
            type="text" 
            name="q" 
            class="search-input" 
            placeholder="Search shops, items, categories..."
            required
          >
          <button type="submit" class="search-button">Search</button>
        </div>
      </form>
    </div>

    <!-- CTA buttons -->
    <div class="hero-ctas">
      <a href="{% url 'explore' %}" class="cta-primary">
        Explore Shops →
      </a>
      <a href="{% url 'listings' %}" class="cta-secondary">
        Browse Listings
      </a>
    </div>
  </div>
</div>

<style>
/* ============================================================
   HERO SECTION STYLES
   ============================================================ */

.hero-wrapper {
  position: relative;
  width: 100%;
  min-height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--surface-0);
}

/* Particles background */
.particles-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--color-primary);
  border-radius: 50%;
  opacity: 0.3;
}

/* Import particle animations from particles.css */
@import url('{% static "css/particles.css" %}');

/* Hero content */
.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  max-width: 700px;
  padding: var(--space-6);
  margin: 0 auto;
}

.hero-title {
  font: 700 clamp(28px, 6vw, 56px) / 1.2 var(--font-display);
  color: var(--text-1);
  margin: 0 0 var(--space-3) 0;
  text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
}

.hero-subtitle {
  font: 500 clamp(14px, 2vw, 18px) / 1.6 var(--font-body);
  color: var(--text-2);
  margin: 0 0 var(--space-6) 0;
}

/* Search bar */
.hero-search {
  margin: 0 0 var(--space-6) 0;
}

.search-form {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
}

.search-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  background: rgba(12, 37, 64, 0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: var(--radius-pill);
  padding: var(--space-1);
  transition: all 0.3s ease;
}

.search-input-wrapper:focus-within {
  border-color: var(--color-primary);
  box-shadow: 0 0 20px rgba(26, 114, 232, 0.3);
}

.search-icon {
  padding: 0 var(--space-3);
  font-size: 18px;
  opacity: 0.6;
}

.search-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-1);
  font: 500 14px var(--font-body);
  padding: var(--space-3) 0;
  outline: none;
}

.search-input::placeholder {
  color: var(--text-3);
}

.search-button {
  background: var(--color-primary);
  color: white;
  border: none;
  padding: var(--space-2) var(--space-4);
  margin: var(--space-1);
  border-radius: var(--radius-pill);
  font: 600 13px var(--font-body);
  cursor: pointer;
  transition: all 0.2s ease;
}

.search-button:hover {
  background: var(--color-primary-hover);
  transform: translateY(-2px);
}

/* CTA buttons */
.hero-ctas {
  display: flex;
  gap: var(--space-4);
  justify-content: center;
  flex-wrap: wrap;
}

.cta-primary,
.cta-secondary {
  display: inline-block;
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-lg);
  font: 600 15px var(--font-body);
  text-decoration: none;
  transition: all 0.3s ease;
  border: 1px solid transparent;
}

.cta-primary {
  background: var(--color-primary);
  color: white;
  box-shadow: 0 8px 24px rgba(26, 114, 232, 0.3);
}

.cta-primary:hover {
  background: var(--color-primary-hover);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(26, 114, 232, 0.4);
}

.cta-secondary {
  background: transparent;
  color: var(--text-1);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.cta-secondary:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: rgba(26, 114, 232, 0.05);
}

/* Responsive */
@media (max-width: 768px) {
  .hero-wrapper {
    min-height: 500px;
    padding-top: var(--space-8);
  }

  .hero-content {
    padding: var(--space-4);
  }

  .hero-title {
    font-size: clamp(24px, 5vw, 36px);
  }

  .hero-ctas {
    flex-direction: column;
  }

  .cta-primary,
  .cta-secondary {
    width: 100%;
  }

  .search-input {
    font-size: 16px;
  }
}

@media (max-width: 480px) {
  .particles-container {
    display: none;
  }

  .hero-wrapper {
    min-height: 400px;
    background: linear-gradient(135deg, var(--blue-800), var(--blue-900));
  }

  .hero-title {
    font-size: clamp(20px, 4vw, 28px);
  }

  .search-button {
    display: none;
  }

  .search-input {
    font-size: 14px;
  }
}
</style>

<script>
// Optional: Add scroll reveal animation
document.addEventListener('DOMContentLoaded', function() {
  const heroContent = document.querySelector('.hero-content');
  heroContent.style.animation = 'fadeInUp 0.8s ease-out';
});
</script>
