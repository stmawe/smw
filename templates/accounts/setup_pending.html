<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting up your account — UniMarket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 480px;
            width: 100%;
            padding: 48px 40px;
            text-align: center;
        }
        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 28px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        .subdomain {
            display: inline-block;
            background: #f0f2ff;
            color: #667eea;
            font-weight: 700;
            font-size: 15px;
            padding: 8px 16px;
            border-radius: 6px;
            margin-bottom: 32px;
            font-family: monospace;
        }
        .steps { text-align: left; margin-bottom: 32px; }
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
            color: #555;
        }
        .step:last-child { border-bottom: none; }
        .step-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 13px;
        }
        .step-icon.done { background: #d4edda; color: #28a745; }
        .step-icon.active { background: #cce5ff; color: #667eea; animation: pulse 1.2s ease-in-out infinite; }
        .step-icon.pending { background: #f8f9fa; color: #aaa; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .countdown { color: #aaa; font-size: 13px; margin-bottom: 16px; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h1>Setting up your account</h1>
        <p class="subtitle">Please wait while we configure your personal space.</p>

        <div class="subdomain">{{ username }}.smw.pgwiz.cloud</div>

        <div class="steps">
            <div class="step">
                <div class="step-icon done">✓</div>
                <span>Account created</span>
            </div>
            <div class="step">
                <div class="step-icon active">⟳</div>
                <span>Registering your subdomain with DNS</span>
            </div>
            <div class="step">
                <div class="step-icon active">⟳</div>
                <span>Issuing SSL certificate</span>
            </div>
            <div class="step">
                <div class="step-icon pending">○</div>
                <span>Verify your email to activate your account</span>
            </div>
        </div>

        <p class="countdown">Redirecting to login in <span id="countdown">8</span>s…</p>
        <a href="{% url 'accounts:login' %}" class="btn">Go to Login</a>
    </div>

    <script>
        let t = 8;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            t--;
            el.textContent = t;
            if (t <= 0) {
                clearInterval(timer);
                window.location.href = "{% url 'accounts:login' %}";
            }
        }, 1000);
    </script>
</body>
</html>
